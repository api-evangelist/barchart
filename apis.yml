name: Barchart
kind: company
description: >-
  Barchart is a leading provider of market data and commodity data, delivering
  real-time, delayed, and historical financial and reference data across
  equities, futures, options, forex, cryptocurrencies, ETFs, mutual funds,
  indexes, and physical commodities. The Barchart OnDemand API is a
  commercially licensed REST/JSON (also XML and CSV) service hosted at
  ondemand.websol.barchart.com, authenticated with an apikey and packaged into
  subscription and enterprise plans. It exposes a broad documented endpoint
  catalog - getQuote, getHistory, getEquitiesByExchange, getFuturesOptions,
  getProfile, getCrypto, getGrainBids, getNews, and dozens more - covering
  quotes, historical time series, fundamentals, corporate actions, options
  analytics, agricultural and energy commodity data, technicals, and news.

aid: barchart
url: https://raw.githubusercontent.com/api-evangelist/barchart/refs/heads/main/apis.yml
name: Barchart
kind: company
description: >-
  Barchart is a leading provider of market data and commodity data, delivering real-time, delayed,
  and historical financial and reference data across equities, futures, options, forex, cryptocurrencies,
  ETFs, mutual funds, indexes, and physical commodities. The Barchart OnDemand API is a commercially
  licensed REST/JSON (also XML and CSV) service hosted at ondemand.websol.barchart.com, authenticated
  with an apikey and packaged into subscription and enterprise plans. It exposes a broad documented
  endpoint catalog - getQuote, getHistory, getEquitiesByExchange, getFuturesOptions, getProfile,
  getCrypto, getGrainBids, getNews, and dozens more - covering quotes, historical time series, fundamentals,
  corporate actions, options analytics, agricultural and energy commodity data, technicals, and news.
accessModel:
  pricing: freemium
  onboarding: self-serve
  trial: true
  try_now: true
  public: false
  label: Freemium (free trial) · Self-serve signup
  confidence: high
  source:
  - plans
  - authentication
  generated: '2026-07-22'
  method: derived
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/icons/barchart.png
tags:
- Market Data
- Financial Data
- Commodities
- Futures
- Options
- Reference Data
- Equities
- Historical Data

      summary: getSectors
      operationId: get-getSectors
      description: The getSectors API from Barchart OnDemand provides returns using weighted alpha on sectors covering multiple periods, including 1-day, 1-month, 3-month, 6-month, 9-month, 12-month and year-to-date.
      parameters: 
        - 
          in: query
          name: apikey
          description: Enter the secret API key.
          required: true
          schema: 
            type: string
            example: YOUR_API_KEY
        - 
          in: query
          name: sector
          description: The symbol of the sector.  Multiple sectors separated by a comma may be used.
          required: false
          schema: 
            type: string
            example: '-MEDR'
        - 
          in: query
          name: sectorPeriod
          description: |
            The period used to calculate the weighted alpha return by the sector, includes: 1-day ("1DA"), 1-month ("1MO"), 3-month ("3MO"), 6-month ("6MO"), 9-month ("9MO"), 12-month ("12MO") and year-to-date ("YTD").
          required: false
          schema: 
            type: string
            enum: 
              - '1DA'
              - '1MO'
              - '3MO'
              - '6MO'
              - '9MO'
              - '12MO'
              - 'YTD'
            example: '1DA'
        - 
          in: query
          name: dailyData
          description: |
            Whether to include daily data: Open, High, Low, Close, Previous Close, 52-week high and 52-week low
          required: false
          schema: 
            type: string
        - 
          in: query
          name: components
          description: Whether to include components of the sector.
          required: false
          schema: 
            type: string
        - 
          in: query
          name: sortDir
          description: Sorting method that should be applied.
          required: false
          schema: 
            type: string

          name: symbols
          description: A symbol or code that identifies a financial instrument.
          required: true
          schema: 
            type: string
            example: 'TSLA,MSFT'
        - 
          in: query
          name: type
          description: |
            The type of chart, includes: bar chart ("BAR"), candlestick ("CANDLE"), area ("AREA") or line ("LINE") chart.
          required: false
          schema: 
            type: string
            enum: 
              - 'BAR'
              - 'LINE'
              - 'CANDLE'
              - 'AREA'

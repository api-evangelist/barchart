  /getTechnicalIndicatorData.json: 
    get: 
      tags: 
        - Charts and Analytics
      summary: getTechnicalIndicatorData
      operationId: get-getTechnicalIndicatorData
      description: The getTechnicalIndicatorData API from Barchart OnDemand provides the requested technical indicators data for the requested symbol.
      parameters: 
        - 
          in: query
          name: apikey
          description: Enter the secret API key.
          required: true
          schema: 
            type: string
            example: YOUR_API_KEY
        - 
          in: query
          name: requestType
          description: The type of response requested from the API. <i>getStudies</i> will return the list of all available indicators with their input sources, periodicity, offset, and meta information. <i>getStudy</i> will return the data for the requested indicator.
          required: true
          schema: 
            type: string
            enum: 
              - 'getStudies'
              - 'getStudy'
            example: 'getStudy'
        - 
          in: query
          name: symbol
          description: A symbol or code that identifies a financial instrument.
          required: true
          schema: 
            type: string
            example: 'AAPL'
        - 
          in: query
          name: studyId
          description: A valid indicator code that identifies a technical indicator when the argument is passed to <i>getStudies</i>.
          required: true
          schema: 
            type: string
            example: 'MA'
        - 
          in: query
          name: startDate
          description: The start date for which the indicator records should be returned.
          required: false
          schema: 
            type: string
            format: date
            example: '2026-06-22'
        - 
          in: query
          name: endDate
          description: The end date for which the indicator records should be returned.
          required: false
          schema: 
            type: string
            format: date
            example: '2026-07-22'
        - 
          in: query
          name: unit
          description: This parameter specifies whether the data to be returned should be tick, minutes (intraday), day (daily), weekly, monthly, quarterly, or yearly.
          required: true
          schema: 
            type: string
            enum: 
              - 'tick'
              - 'intraday'
              - 'day'
              - 'week'
              - 'month'
              - 'quarter'
              - 'year'
        - 
          in: query
          name: numberOfBars
          description: The maximum number of records requested over the requested date range.
          required: false
          schema: 
            type: integer
            example: 100
        - 
          in: query
          name: inputs
          description: You can pass any valid input values for the selected study that are not always returned via this parameter. For example, for <i>Moving Average (MA)</i>, you can pass values as - inputs[Period]=50&inputs[Source]=Open&inputs[Offset]=1. For an input field of type enumeration, please ensure you pass a value from the provided list of values.
          required: false
          schema: 
            type: string
        - 
          in: query
          name: fields
          description: |
            Pass any optional price fields you would like to be included in the response.<br/>Available values (multiple values separated by a comma may be used): *open, high, low, close, volume, open_interest*.
          required: false
          schema: 
            type: string
            example: 'open,high'
        - 
          in: query
          name: spec
          description: This parameter is used to specify whether the data should be plain, nearest or continuation records. Nearest and continuation are ignored for equities, and if specified the query will simply return plain records.
          required: false
          schema: 
            type: string
            enum: 
              - 'none'
              - 'nearest'
              - 'continue'
              - 'per_count'
              - 'per_volume'
              - 'per_range'
              - 'per_seconds'
              - 'top_of_book'
        - 
          in: query
          name: size
          description: N/A
          required: false
          schema: 
            type: integer
            example: 1
        - 
          in: query
          name: isContractVolume
          description: For futures, this parameter determines whether the returned volume should be the contract volume or the total volume. By default, it returns the total volume.
          required: false
          schema: 
            type: string
            example: 'true'
        - 
          in: query
          name: dividendsAdjust
          description: Turns on/off dividends adjustment for stock data. By default it is off.
          required: false
          schema: 
            type: string
            example: 'true'
        - 
          in: query
          name: backAdjust
          description: This parameter specifies whether the contracts in the series will be adjusted based on the roll-gap between the closing prices of the current contract and the previous contract on the day of the switch. Valid values are true and false. If not specified, the default value is false resulting in a non-adjusted query. Adjustments are reflected starting from the current date, regardless if an end date is set or not. This parameter only applies to multi-contract futures queries and is ignored for all other queries.
          required: false
          schema: 
            type: string
            example: 'true'
        - 
          in: query
          name: daysToExpiration
          description: This parameter specifies the number of calendar days prior to a contract expiration when the series of contracts will be switched to the next contract in the series. Valid values are 0 through 60. A value of 0 will tell the system to use the day of expiration. If not specified, the default value (1) is used, resulting in each contract in the series to run until (and including) the day prior to its expiration. This parameter only applies to multi-contract futures queries and is ignored for all other queries.
          required: false
          schema: 
            type: integer
            example: 1
        - 
          in: query
          name: contractRoll
          description: For futures, this parameter determines the switch from one contract to the next in the series is calculated. When the value specified is 'expiration', the switch from one contract to the next in the series will be based on the expiration date (and the value of the 'daystoexpiration' parameter if specified). When the value specified is 'combined', a combination of volume and openinterest will be used to determine when to switch from one contract to the next in the series (when using this value, the 'daystoexpiration' parameter is ignored).
          required: false
          schema: 
            type: string
            enum: 
              - 'combined'
              - 'expiration'
        - 
          in: query
          name: decimalPrecision
          description: The decimal precision to be applied to the requested study fields in the response.
          required: false
          schema: 
            type: string
            enum: 
              - 'auto'
              - '0'
              - '1'
              - '2'
              - '3'
              - '4'
              - '5'
              - '6'
              - '7'
              - '8'
        - 
          in: query
          name: interval
          description: To aggregate sets of contiguous minute records (the number of minute records in each set is equal to the specified interval) into one record.
          required: false
          schema: 
            type: integer
            example: 5
      responses: 
        '200': 
          description: OK (Success)
          content: 
            application/json: 
              schema: 
                type: object
                properties: 
                  status: 
                    type: object
                    description: The status object when an error occurs or when a response is successful.
                    required: 
                      - code
                      - message
                    properties: 
                      code: 
                        description: The status code of the response.
                        type: integer
                        example: 200
                      message: 
                        description: The status message corresponding to the status code.
                        type: string
                        example: Success.
                  results: 
                    description: The results object of the API operation.
                    type: array
                    uniqueItems: true
                    items: 
                      type: object
                      properties: 
                        symbol: 
                          description: A symbol or code that identifies a financial instrument.
                          type: string
                          nullable: true
                          example: 'AAPL'
                        data: 
                          description: Returns timestamped values for each indicator.
                          nullable: true
                      required: 
                        - symbol
                        - data
        '204': 
          description: No Content
        '400': 
          description: Bad Request
        '500': 
          description: Internal Server Error

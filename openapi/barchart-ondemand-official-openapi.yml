  /getCropFactors.json: 
    get: 
      tags: 
        - Other Data
      summary: getCropFactors
      operationId: get-getCropFactors
      description: The getCropFactors API provides weather data/factors specific to Ag Industry. With this API, you can retrieve satellite imagery derived weather factors, like Normalized Difference Vegetation Index (<b>NDVI</b>), Normalized Difference Water Index (<b>NDWI</b>), and Land Surface Temperature(<b>LSTD</b> & <b>LSTN</b>), and station collected weather data, like air temperature(<b>TMAX</b> & <b>TMIN</b>), and accumulated precipitation(<b>PRCP</b>).<br />Data can be requested for a combination of counties and observation windows.
      parameters: 
        - 
          in: query
          name: apikey
          description: Enter the secret API key.
          required: true
          schema: 
            type: string
            example: YOUR_API_KEY
        - 
          in: query
          name: countyCode
          description: A county FIPS code or a code that identifies multiple counties. A valid code consists of multiple county FIPS codes separated by a comma, and the code can contain up to 100 counties. Mutually exclusive with stateCode.<br />Please <a target="_blank" href="https://www.nass.usda.gov/Data_and_Statistics/County_Data_Files/Frequently_Asked_Questions/county_list.txt">click</a> here to get a list of possible values.
          required: true
          schema: 
            type: string
            example: '17031,17111'
        - 
          in: query
          name: stateCode
          description: A state FIPS code or a code that identifies multiple states. A valid code consists of multiple state FIPS codes separated by a comma, and the code can contain up to 20 states.<br />Please <a target="_blank" href="https://www.nass.usda.gov/Data_and_Statistics/County_Data_Files/Frequently_Asked_Questions/county_list.txt">click</a> here to get a list of possible values.
          required: false
          schema: 
            type: string
            example: '19,17'
        - 
          in: query
          name: startDate
          description: The start date of the historical data query. This parameter should be set to the desired start date/time for the query (the result set will include records back to, and including, this value). If not set, the value will default to 20260101
          required: true
          schema: 
            type: string
            example: '20260601'
        - 
          in: query
          name: endDate
          description: The end data of the historical data query. This parameter should be set to the desired end date/time for the query (the result set will include records up to, and including, this value). If not set, the value will default to the day specified in the start parameter.
          required: false
          schema: 
            type: string
            example: '20260722'
        - 
          in: query
          name: fields
          description: |
            Additional as per-requested fields that the user can define. Requested fields should be separated by a comma.<br/>Available values (multiple values separated by a comma may be used): *ndviCount, ndwiCount, lstdCount, lstnCount, tmaxCount, tminCount, prcpCount*.
          required: false
          schema: 
            type: string
            example: 'ndviCount,ndwiCount'
      responses: 
        '200': 
          description: OK (Success)
          content: 
            application/json: 
              schema: 
                type: object
                properties: 
                  status: 
                    type: object
                    description: The status object when an error occurs or when a response is successful.
                    required: 
                      - code
                      - message
                    properties: 
                      code: 
                        description: The status code of the response.
                        type: integer
                        example: 200
                      message: 
                        description: The status message corresponding to the status code.
                        type: string
                        example: Success.
                  results: 
                    description: The results object of the API operation.
                    type: array
                    uniqueItems: true
                    items: 
                      type: object
                      properties: 
                        countyCode: 
                          description: FIPS code for the county. Concatenation of stateFipsCode and countyFipsCode.
                          type: string
                          nullable: true
                          example: '19041'
                        county: 
                          description: The name of the county corresponds to the weather data.
                          type: string
                          nullable: true
                          example: 'Clay County'
                        state: 
                          description: 2-char abbreviation of the state.
                          type: string
                          nullable: true
                          example: 'IA'
                        startDate: 
                          description: Start date of 8-days composite window.
                          type: string
                          format: date
                          nullable: true
                          example: '2021-01-01'
                        endDate: 
                          description: End date of 8-days composite window.
                          type: string
                          format: date
                          nullable: true
                          example: '2021-01-08'
                        ndvi: 
                          description: Average Normalized Difference Vegetation Index (NDVI) for croplands within a county calculated based on MODIS with daily updating.
                          type: number
                          format: double
                          nullable: true
                          example: -0.00899
                        ndviCount: 
                          description: Count of cropland grids(250m * 250m) that contributed to calculating NDVI
                          type: integer
                          nullable: true
                          example: 12548
                        ndwi: 
                          description: Average Normalized Difference Water Index (NDWI) for croplands within a county calculated based on MODIS with daily updating.
                          type: number
                          format: double
                          nullable: true
                          example: 0.75143
                        ndwiCount: 
                          description: Count of cropland grids(250m * 250m) that contributed to calculating NDWI
                          type: integer
                          nullable: true
                          example: 12548
                        lstd: 
                          description: Average Land Surface Temperature Daytime (LSTD) in Celsius degrees for croplands within a county calculated based on MODIS with daily updating. Unit in celsius degrees.
                          type: number
                          format: double
                          nullable: true
                          example: -0.87
                        lstdCount: 
                          description: Count of cropland grids(250m * 250m) that contributed to calculating LSTD
                          type: integer
                          nullable: true
                          example: 12548
                        lstn: 
                          description: Average Land Surface Temperature Nighttime (LSTN) in Celsius degrees for croplands within a county calculated based on MODIS with daily updating. Unit in celsius degrees.
                          type: number
                          format: double
                          nullable: true
                          example: -14.31
                        lstnCount: 
                          description: Count of cropland grids(250m * 250m) that contributed to calculating LSTN.
                          type: integer
                          nullable: true
                          example: 12548
                        tmax: 
                          description: Average Maximum Air Temperature in Celsius degrees for a county calculated based on land surface stations with daily updating.
                          type: number
                          format: double
                          nullable: true
                          example: 0.31
                        tmaxCount: 
                          description: Count of land surface stations that contributed to calculating TMAX.
                          type: integer
                          nullable: true
                          example: 2
                        tmin: 
                          description: Average Minimum Air Temperature in Celsius degrees for a county calculated based on land surface stations with daily updating.
                          type: number
                          format: double
                          nullable: true
                          example: -10.06
                        tminCount: 
                          description: Count of land surface stations that contributed to calculating TMIN.
                          type: integer
                          nullable: true
                          example: 2
                        prcp: 
                          description: Average accumulated precipitation in millimeter for a county in the 8-days window.
                          type: number
                          format: double
                          nullable: true
                        prcpCount: 
                          description: Count of land surface stations that contributed to calculating PRCP.
                          type: integer
                          nullable: true
                          example: 2
                        updatedAt: 
                          description: Date that factors were last updated for a county.
                          type: string
                          nullable: true
                          example: '2021-01-17T00:00:00-06:00'
                      required: 
                        - countyCode
                        - county
                        - state
                        - startDate
                        - endDate
                        - ndvi
                        - ndwi
                        - lstd
                        - lstn
                        - tmax
                        - tmin
                        - prcp
                        - updatedAt
        '204': 
          description: No Content
        '400': 
          description: Bad Request
        '500': 
          description: Internal Server Error
  /getUniqueIdentifier.json: 
    get: 
      tags: 
        - Other Data
      summary: getUniqueIdentifier
      operationId: get-getUniqueIdentifier
      description: The getUniqueIdentifier provides the Financial Instrument Global Identifier (FIGI) information for all available instruments. For more information on FIGI, please <a target="_blank" href="https://www.openfigi.com/about/figi">click here</a>.
      parameters: 
        - 
          in: query
          name: apikey
          description: Enter the secret API key.
          required: true
          schema: 
            type: string
            example: YOUR_API_KEY
        - 
          in: query
          name: identifierType
          description: |
            The code/value for the global identifier protocol.<br/>Available values (multiple values separated by a comma may be used): *openFIGI*.
          required: false
          schema: 
            type: string
            example: 'openFIGI'
        - 
          in: query
          name: barchartSymbols
          description: The unique barchart identifier. Multiple symbols can be requested separated by a comma.
          required: false
          schema: 
            type: string
            example: 'IBM,GOOGL'
        - 
          in: query
          name: exchange
          description: A valid exchange identifer code.
          required: false
          schema: 
            type: string
            example: 'NYSE'
        - 
          in: query
          name: openFIGIGlobal
          description: The unique global OpenFIGI id. Multiple IDs can be requested separated by a comma.
          required: false
          schema: 
            type: string
            example: 'BBG0015VZ6S1'
        - 
          in: query
          name: openFIGIComposite
          description: The unique composite OpenFIGI id. Multiple IDs can be requested separated by a comma.
          required: false
          schema: 
            type: string
      responses: 
        '200': 
          description: OK (Success)
          content: 
            application/json: 
              schema: 
                type: object
                properties: 
                  status: 
                    type: object
                    description: The status object when an error occurs or when a response is successful.
                    required: 
                      - code
                      - message
                    properties: 
                      code: 
                        description: The status code of the response.
                        type: integer
                        example: 200
                      message: 
                        description: The status message corresponding to the status code.
                        type: string
                        example: Success.
                  results: 
                    description: The results object of the API operation.
                    type: array
                    uniqueItems: true
                    items: 
                      type: object
                      properties: 
                        symbol: 
                          description: A symbol or code that identifies a financial instrument.
                          type: string
                          nullable: true
                          example: 'SLNLF'
                        symbolName: 
                          description: The name of the financial instrument.
                          type: string
                          nullable: true
                          example: 'Stella International Holdings Ltd.'
                        exchange: 
                          description: Exchange code for the marketplace where the financial instruments are listed.
                          type: string
                          nullable: true
                          example: 'HKEX'
                        openFIGI: 
                          description: An object with OpenFIGI unique identifer information (global and composite) for each available symbol.
                          type: object
                          properties: 
                            global: 
                              type: string
                              example: BBG000RPRDK4
                            composite: 
                              type: string
                              example: BBG000RPRDK4
                            name: 
                              type: string
                              example: STELLA INTERNATIONAL
                          nullable: true
                      required: 
                        - symbol
                        - symbolName
                        - exchange
                        - openFIGI
        '204': 
          description: No Content
        '400': 
          description: Bad Request
        '500': 
          description: Internal Server Error
  /getYieldForecastPlanet.json: 
    get: 
      tags: 
        - Other Data
      summary: getYieldForecastPlanet
      operationId: get-getYieldForecastPlanet
      description: The getYieldForecast API provides Barchart proprietary grain yield forecast data. Yield Index data can be filtered by commodity, by indexGroup, by state, by district, and by county. The unit is in Bushel per Acre.
      parameters: 
        - 
          in: query
          name: apikey
          description: Enter the secret API key.
          required: true
          schema: 
            type: string
            example: YOUR_API_KEY
        - 
          in: query
          name: country
          description: The ISO-2 country code to further refine the instruments.
          required: true
          schema: 
            type: string
            enum: 
              - 'US'
            example: 'US'
        - 
          in: query
          name: state
          description: An ANSI-2 state abbreviation to define the state that yield forecast index will be returned for.
          required: false
          schema: 
            type: string
            example: 'IL'
        - 
          in: query
          name: stateFips
          description: A valid 2-digits state fips code used to define the state that yield forecast index will be returned for. Please click <a target="_blank" href="https://www.nass.usda.gov/Data_and_Statistics/County_Data_Files/Frequently_Asked_Questions/county_list.txt">here</a> to get a list of possible values.
          required: false
          schema: 
            type: string
            example: '17'
        - 
          in: query
          name: districtCode
          description: A valid 2-digit district code used to define the district that yield forecast index will be returned for. Please click <a target="_blank" href="https://www.nass.usda.gov/Data_and_Statistics/County_Data_Files/Frequently_Asked_Questions/county_list.txt">here</a> to get a list of possible values.
          required: false
          schema: 
            type: string
            example: '50'
        - 
          in: query
          name: county
          description: A county name to define the county that yield forecast index will be returned for.

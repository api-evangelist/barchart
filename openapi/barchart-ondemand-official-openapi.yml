                          type: integer
                          nullable: true
                          example: 452357
                        putCallOpenInterestRatio: 
                          description: The total put volume divided by the total call volume (across all expiration dates) based on contracts traded during the current session.
                          type: number
                          format: double
                          nullable: true
                          example: 0.77379598622864
                        date: 
                          description: The date of the data referenced.
                          type: string
                          format: date
                          nullable: true
                          example: '2026-07-22'

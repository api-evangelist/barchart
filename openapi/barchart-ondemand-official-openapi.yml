  /getInstrumentDefinition.json: 
    get: 
      tags: 
        - Metadata
      summary: getInstrumentDefinition
      operationId: get-getInstrumentDefinition
      description: The getInstrumentDefinition API from Barchart OnDemand is available to request metadata on financial instruments by symbol, exchange, or exchange MIC. Metadata includes instrument names, exchange codes, tick increments, base codes, expiration dates and more.
      parameters: 
        - 
          in: query
          name: apikey
          description: Enter the secret API key.
          required: true
          schema: 
            type: string
            example: YOUR_API_KEY
        - 
          in: query
          name: symbols
          description: A symbol or code that identifies a financial instrument.
          required: false
          schema: 
            type: string
        - 
          in: query
          name: exchanges
          description: |
            Exchange code for the marketplace where the financial instruments are listed.<br/>Available values (multiple values separated by a comma may be used): *FOREX, RATE, RATES, SECTOR, DGCX, DME, MATBA, ROFEX, ASX, SFE, BMF, BSE, CNSX, INDEX-TSX, MNTRL, TSX, TSX-V, WCE, CFFEX, CZCE, DCE, SHFE, EEX, EUIDX, EUREX, MEFF, MATIF, HKFE, MCX, NCDEX, NSE, ISE, JPX, TOCOM, KFE, MDEX, NZX, MOEX, OMX, ICESI, TFEX, TAIWA, ICE, LCE, LIFFE, LME, LSE, AMEX, BATS, CADFUNDS, CBOT, CBOTM, CFE, CME, COMEX, CRYPTO, CXMI, ERIS, FUND, GBLX, GREEN, ICEUS, INDEX, INDEX-CBOE, INDEX-DOW, INDEX-NQ, INDEX-NY, INDEX-RL, INDEX-SP, KCBT, MIAX, NASDAQ, NYMEX, NYMI, NYSE, OTC-BB, OTHER OTC, TRADAIR, SAFEX, SIMEX, C3, C3_BUNKER, PLATTS, CXE, BXE, DXE, EURNXT_EQ_BE, EURNXT_EQ_FR, EURNXT_EQ_NL, EURNXT_EQ_PT, ENDEX, EEX_POWER, OMX_POWER, GPC_PRICES*.
          required: false
          schema: 
            type: string
            example: 'CME'
        - 
          in: query
          name: exchangeMics
          description: Market Indicator Code for the marketplace where the financial instruments are listed.
          required: false
          schema: 
            type: string
            example: 'XCME'
        - 
          in: query
          name: maxRecords
          description: The maximum number of records requested.
          required: false
          schema: 
            type: integer
            example: 20
        - 
          in: query
          name: offset
          description: A value denoting where to start results from.
          required: false
          schema: 
            type: integer
            example: 10
        - 
          in: query
          name: returnExpired
          description: If you would like to request data for an expired futures contract, please set this parameter to true.
          required: false
          schema: 
            type: string
            example: '1'
      responses: 
        '200': 
          description: OK (Success)
          content: 
            application/json: 
              schema: 
                type: object
                properties: 
                  status: 
                    type: object
                    description: The status object when an error occurs or when a response is successful.
                    required: 
                      - code
                      - message
                    properties: 
                      code: 
                        description: The status code of the response.
                        type: integer
                        example: 200
                      message: 
                        description: The status message corresponding to the status code.
                        type: string
                        example: Success.
                  results: 
                    description: The results object of the API operation.
                    type: array
                    uniqueItems: true
                    items: 
                      type: object
                      properties: 
                        guid: 
                          description: Globally Unique Identifier of a financial instrument.
                          type: string
                          nullable: true
                          example: 'BRF2022'
                        id: 
                          description: Identifier of a financial instrument.
                          type: string
                          nullable: true
                          example: '131403082'
                        symbolRealtime: 
                          description: The Realtime name of the instrument.
                          type: string
                          nullable: true
                          example: 'BRF2022'
                        symbolHistorical: 
                          description: The Historical name of the instrument.
                          type: string
                          nullable: true
                          example: 'BRF22'
                        symbolDdf: 
                          description: The DDF name of the instrument.
                          type: string
                          nullable: true
                          example: 'BRF2'
                        symbol: 
                          description: A symbol or code that identifies a financial instrument.
                          type: string
                          nullable: true
                          example: 'BRF2'
                        symbolName: 
                          description: The full name of the instrument.
                          type: string
                          nullable: true
                          example: 'Brazilian Real (Pit)'
                        symbolExpiration: 
                          description: The last day that the financial instrument is traded.
                          type: string
                          format: date
                          nullable: true
                          example: '2021-12-31'
                        symbolCFI: 
                          description: The symbol's classification of financial instruments code. 
                          type: string
                          nullable: true
                          example: 'FXXXXX'
                        exchange: 
                          description: Exchange code for the marketplace where the financial instruments are listed.
                          type: string
                          nullable: true
                          example: 'CME'
                        exchangeName: 
                          description: The name of the exchange.
                          type: string
                          nullable: true
                          example: 'CME'
                        exchangeCode: 
                          description: The smallest increment at which the financial instrument can be traded.
                          type: string
                          nullable: true
                          example: 'M'
                        tickIncrement: 
                          description: |
                            The number of units that make up one tick. For example, U.S. equities are quotes in decimals, and tick in decimals, and can go up +/- .01. So the tick increment is 1. But the e-mini S&P futures contract, though quoted in decimals, goes up in .25 increments, so the tick increment is 25.
                          type: integer
                          nullable: true
                          example: 5
                        baseCode: 
                          description: Indicates the fractional or decimal precision of the instrument.<br /><br />2 = 1/8 = one digit fraction, range is 0 - 7<br />3 = 1/16 = two digit fraction, range is 0 - 15<br />4 = 1/32 = two digit fraction, range is 0 - 31<br />5 = 1/64 = two digit fraction, range is 0 - 63<br />6 = 1/128 = three digit fraction, range is 0 - 127<br />7 = 1/256 = three digit fraction, range is 0 - 255<br />8 = 0 = no decimal places, a whole number<br />9 = 0.1 = one decimal place<br />A = 0.01 = two decimal places<br />B = 0.001 = three decimal places<br />C = 0.0001 = four decimal places<br />D = 0.00001 = five decimal places<br />E = 0.000001 = six decimal places<br />F = 0.0000001 = seven decimal places<br />* = unchanged = transmitted by ddfplus with size only data
                          type: string
                          nullable: true
                          example: 'D'
                        unitCode: 
                          description: The corresponding unit code
                          type: integer
                          nullable: true
                          example: 5
                        pointValue: 
                          description: An indicator representing the value of one point in dollar terms. This applies to futures.
                          type: number
                          format: double
                          nullable: true
                          example: 100000
                      required: 
                        - guid
                        - id
                        - symbolRealtime
                        - symbolHistorical
                        - symbolDdf
                        - symbol
                        - symbolName
                        - symbolExpiration
                        - symbolCFI
                        - exchange
                        - exchangeName
                        - exchangeCode
                        - tickIncrement
                        - baseCode
                        - unitCode
                        - pointValue
        '204': 
          description: No Content
        '400': 
          description: Bad Request
        '500': 
          description: Internal Server Error

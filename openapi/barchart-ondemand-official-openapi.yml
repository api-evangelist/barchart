  /getRestrictedSessionHistory.json: 
    get: 
      tags: 
        - Price Data
      summary: getRestrictedSessionHistory
      operationId: get-getRestrictedSessionHistory
      description: The getRestrictedSessionHistory API is used to request historical time series data on stocks, indexes, mutual funds, ETFs, futures, foreign exchange, or cryptocurrencies. Historical data is available as minute bars data. This API also requests startMinute and endMinute parameter and will return price data for the requested date ranges for timestamp between the requested start and end minutes.
      parameters: 
        - 
          in: query
          name: apikey
          description: Enter the secret API key.
          required: true
          schema: 
            type: string
            example: YOUR_API_KEY
        - 
          in: query
          name: symbol
          description: A symbol or code that identifies a financial instrument.
          required: true
          schema: 
            type: string
            example: 'AAPL'
        - 
          in: query
          name: type
          description: The type of historical data to return, including tick data, minute data, and end-of-day data.
          required: true
          schema: 
            type: string
            enum: 
              - 'minutes'
              - 'nearbyMinutes'
              - 'formTMinutes'
            example: 'minutes'
        - 
          in: query
          name: startDate
          description: The start date of the historical data query.  This parameter should be set to the desired start date/time for the query (the result set will include records back to, and including, this value). If not set, the value will default to the beginning of the day specified in the end parameter, if end is specified, or to the beginning of the current day, if end is not specified. The value should conform to the format yyyymmdd[hhmm[ss]], where fields in brackets are optional (Do not include the brackets themselves). Any optional fields that are not explicitly set will default to 0 (i.e. 20090203 will default to 20090203000000 or February 3, 2009 at 00:00:00).
          required: false
          schema: 
            type: string
            format: date
            example: '2010-01-01'
        - 
          in: query
          name: endDate
          description: The end data of the historical data query.  This parameter should be set to the desired end date/time for the query (the result set will include records up to, but not including, this value). If not set, the value will default to the end of the day specified in the start parameter, if specified, or to the end of the current day, if start is not specified. The value should conform to the format yyyymmdd[hhmm[ss]], where fields in brackets are optional (Do not include the brackets themselves). Any optional fields that are not explicitly set will default to 0 (i.e. 20090203 will default to 20090203000000 or February 3, 2009 at 00:00:00).
          required: false
          schema: 
            type: string
            format: date
            example: '2013-01-01'
        - 
          in: query
          name: startMinute
          description: The start time value in 24 hour format.
          required: false
          schema: 
            type: string
            example: '8:30'
        - 
          in: query
          name: endMinute
          description: The end time value in 24 hour format
          required: false
          schema: 
            type: string
            example: '13:20'
        - 
          in: query
          name: maxRecords
          description: The maximum amount of records returned.  This parameter should be set to the maximum number of records desired. If not specified, there number of records returned will be determined by the date/time parameters specified as well as any defaults that apply to the query.
          required: false
          schema: 
            type: integer
            example: 10
        - 
          in: query
          name: interval
          description: The number of minutes for a minute query.
          required: false
          schema: 
            type: integer
            example: 60
        - 
          in: query
          name: order
          description: An arrangement of fields within a particular record (ascending or descending).   This parameter can be set to one of two values ("asc" and "desc") in order to specify the chronological order of the result set returned. If this parameter is not specified, the order results is not guaranteed.
          required: false
          schema: 
            type: string
            enum: 
              - 'asc'
              - 'desc'
            example: 'asc'
        - 
          in: query
          name: sessionFilter
          description: This parameter modifies the default session codes/sale conditions used to return ticks for each exchange. For NYSE and AMEX, the default session filter is "@EFKX56V9" (meaning all ticks with sale conditions corresponding to one of the characters in the filter are included in the results), for NASDAQ the default is "@ABDEFKOSXY156", and for everything else all session codes/sale conditions are returned except the settle (session code '*'). If the session filter is set to a string of valid session codes (i.e. "EFK"), only ticks with the specified session codes are included in the results. If the string is prefixed with character '!' (i.e."!EFK"), all session codes except those in the string are included in the results. If the string is prefixed with character '+' (i.e. "+T"), then all the default session codes in addition to the ones specified in the string are included in the results. And if the string is prefixed with character '-' (i.e. "-EF") then all default session codes except the ones specified are included in the results. Please note that the '+' character should be escaped (to %2B) when entering the URL in a web browser or executing the query in an API that does not escape it by default.
          required: false
          schema: 
            type: string
            example: 'EFK'
        - 
          in: query
          name: splits
          description: An adjustment of stock value due to corporate action.   This parameter only applies to stocks and specifies whether the data returned should be adjusted for splits or not. Set to true to query for adjusted the data, or to false for non-adjusted data. If not specified, the default is true. In order to guarantee the same adjustment settings in the future, this parameter should be specified.
          required: false
          schema: 
            type: string
            example: 'true'
        - 
          in: query
          name: dividends
          description: A distribution of a portion of a company's earnings.  This parameter only applies to stocks and specifies whether the data returned should be adjusted for dividends or not. Set to true to query for adjusted the data, or to false for non-adjusted data. If not specified, the default is true. In order to guarantee the same adjustment settings in the future, this parameter should be specified.
          required: false
          schema: 
            type: string
            example: 'true'
        - 
          in: query
          name: volume
          description: The quantity of shares or contracts traded.  For futures, this parameter can be set to one of two values (contract and total) in order to specify whether the volume returned should be the contract volume or the total volume. For aggregates (such as weekly, monthly or yearly), this returns the average volume for the period specified. If the value is preceded by 'sum' (sumcontract and sumtotal), then it returns the sum of the volumes in each daily bar during the period specified. If not specified, the value will default to contract. For aggregate equities queries (such as weekly, monthly or yearly), this parameter can be set to sum to return the sum of the volumes in each daily bar during the period specified. If not specified, then the average volume is returned.
          required: false
          schema: 
            type: string
            enum: 
              - 'total'
              - 'sum'
              - 'contract'
              - 'sumcontract'
              - 'sumtotal'
            example: 'sum'
        - 
          in: query
          name: nearby
          description: This parameter specifies the offset from the front month for 'nearest' queries (data parameter set to dailynearest, weeklynearest, monthlynearest, quarterlynearest and yearlynearest). The default value for this parameter is 1, which sets nearest queries to the most current front month. If set to a value greater than 1, then the nth front month is used (for example, in August of 2010, ESU10 would be the current front month, so nearby=2 would use ESZ10, nearby=3 would use ESH11, etc.) This parameter is ignored for all other queries. Alternatively, the same functionality provided by the nearby parameter can be achieved using the symbol notation symbol=RS*n, where RS is the root symbol and n is the nth front month (i.e. symbol=ES*1, symbol=YM*3, etc.). When using this notation on the symbol parameter, the nearby parameter should be omitted.
          required: false
          schema: 
            type: integer
            example: 1
        - 
          in: query
          name: jerq
          description: Whether to merge with JERQ data.
          required: false
          schema: 
            type: string
            example: 'true'
        - 
          in: query
          name: exchange
          description:  The list of valid exchange codes to limit symbol search.
          required: false
          schema: 
            type: string
            example: 'NYSE,AMEX,NASDAQ'
        - 
          in: query
          name: backAdjust
          description: This parameter specifies whether the contracts in the series will be adjusted based on the roll-gap between the closing prices of the current contract and the previous contract on the day of the switch. Valid values are true and false. If not specified, the default value is false resulting in a non-adjusted query. This parameter only applies to multi-contract futures queries and is ignored for all other queries.
          required: false
          schema: 
            type: string
            enum: 
              - 'true'
              - 'false'
            example: 'false'
        - 
          in: query
          name: daysToExpiration
          description: This parameter specifies the number of calendar days prior to a contract expiration when the series of contracts will be switched to the next contract in the series. Valid values are 0 through 60. A value of 0 will tell the system to use the day of expiration. If not specified, the default value (1) is used, resulting in each contract in the series to run until (and including) the day prior to its expiration. This parameter only applies to multi-contract futures queries and is ignored for all other queries.
          required: false
          schema: 

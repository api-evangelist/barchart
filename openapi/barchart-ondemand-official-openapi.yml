                          description: The at-the-money average implied volatility (IV) of the nearest monthly options contract that is 30 days out or more, calculated using the Binomial model.
                          type: number
                          format: double
                          nullable: true
                          example: 0.33212003972813
                        weightedImpliedVolatilityChange: 
                          description: The day-over-day change in the weighted implied volatility value.
                          type: number
                          format: double
                          nullable: true
                          example: -0.0062499761547806
                        impliedVolatilityRank1y: 
                          description: |
                            Implied volatility (IV) rank compares the current level of IV to its historical range of values over the prior 1-year. Calculation method: IV Rank = (Current IV - IV Low) / (IV High - IV Low) x 100.
                          type: number
                          format: double
                          nullable: true
                          example: 37.487970230646
                        impliedVolatilityPercentile1y: 
                          description: |
                            Implied Volatility Percentile is the percentage of days with IV closing below the current IV value over the prior 1-year. Calculation method: IV Percentile = (number of day current IV was above historical values) / (total number of days within history) * 100.
                          type: number
                          format: double
                          nullable: true
                          example: 0.64
                        totalVolume: 
                          description: Total volume for all option contracts (across all expiration dates) traded during the current session.
                          type: integer
                          nullable: true
                          example: 49755
                        putCallVolumeRatio: 

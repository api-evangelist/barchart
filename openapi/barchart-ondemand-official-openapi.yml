  /getGrainInstruments.json: 
    get: 
      tags: 
        - Other Data
      summary: getGrainInstruments
      operationId: get-getGrainInstruments
      description: The getGrainInstruments API is used to request symbol and metadata information regarding physical grain instruments across Barchart's cash bids and grain indexes.  Users can request information based on crop type / root symbol, geo-location, or areas that are codified by FIPS standards. Returned instruments and their corresponding symbols can be passed to getQuote or getHistory to retrieve the associated price data - as requested by the end user. Find our more about our <a target="_blank" href="https://www.barchart.com/cmdty">commodity data</a> offerings here.
      parameters: 
        - 
          in: query
          name: apikey
          description: Enter the secret API key.
          required: true
          schema: 
            type: string
            example: YOUR_API_KEY
        - 
          in: query
          name: instrumentType
          description: The type of grain instruments. This parameter should be set to the desired instrument type for the query.
          required: true
          schema: 
            type: string
            enum: 
              - 'bidBasis'
              - 'bidCash'
              - 'indexBasis'
              - 'indexCash'
            example: 'indexBasis'
        - 
          in: query
          name: instrumentRoot
          description: |
            A 2-char indicator for commodities. This parameter should be set to the root that represents the desired commodity for the query. Roots that are denoted as "all" are valid for both bid and index data - if "bids" then there is no index associated with that root.<br /><br />ZC: All kinds of Corn and Milo/Sorghum (all), ZS: All kinds of Soybeans (all), ZW: All kinds of Soft Red Winter Wheat (all), MW: All kinds of Spring Wheat (all), KE: All kinds of Hard Red Winter Wheat (all), FW: All kinds of Feed Wheat (bids), DW:  All kinds of Durum Wheat (bids), CW: Wheat (Club) (bids), ZM: Soybean Meal (bids), HS: Soybeans (Hulls) (bids), ZO: Oats (bids), BB: Barley (bids), ZR: Rice (bids), ZK: Ethanol (E85) (bids), GP: Peas (Green) (bids), YP: Peas (Yellow) (bids), SF: Birdseed or Sunflowers (bids), RY: Rye (bids), RS: Canola (bids), PC: Pulse Crops (Peas, Dry Beans, Lentils & Chickpeas) (bids), PB: Beans (Pinto) (bids), LB: Beans (Lentil) (bids), GB: Beans (Garbonzo) (bids), MI: Millet (bids), MD: Distiller Grains (MWDGS) (bids), DG: Distiller Grains (DDGS) (bids), FL: Flax (bids), CS: Cottonseed (bids)
          required: true
          schema: 
            type: string
            example: 'ZC'
        - 
          in: query
          name: zipCode
          description: A valid zip code to refine the area that cash bids orgin from. This parameter is required if stateFipsCode has not been set. This is the only way to query Canada grain bids.
          required: false
          schema: 
            type: string
        - 
          in: query
          name: stateFipsCode
          description: A valid 2-digit state code used to define the area that the underlying grain data (bids or indexes) will be returned from. This parameter is required if zipCode and indexGroup have not been set. Note that calls using this field will return instruments for counties and districts that are associated with the requested stateFipsCode - in addition any instruments with an area equal to the user specified stateFipsCode.<br /><br />Please click <a target="_blank" href="https://www.nass.usda.gov/Data_and_Statistics/County_Data_Files/Frequently_Asked_Questions/county_list.txt">here</a> to get a list of possible values.
          required: false
          schema: 
            type: string
        - 
          in: query
          name: districtCode
          description: A valid 2-digit district code used to define the area that the underlying grain data (bids or indexes) will be returned from. Note that calls using this field will return instruments for counties that are associated with the requested districtCode - in addition any instruments with an area equal to the user specified districtCode.<br /><br />Please click <a target="_blank" href="https://www.nass.usda.gov/Data_and_Statistics/County_Data_Files/Frequently_Asked_Questions/county_list.txt">here</a> to get a list of possible values.
          required: false
          schema: 
            type: string
        - 
          in: query
          name: countyFipsCode
          description: A valid 3-digit county code use to define the the area that the underlying grain data (bids or indexes) will be returned from.<br /><br />Please click <a target="_blank" href="https://www.nass.usda.gov/Data_and_Statistics/County_Data_Files/Frequently_Asked_Questions/county_list.txt">here</a> to get a list of possible values.
          required: false
          schema: 
            type: string
        - 
          in: query
          name: deliveryMonth
          description: |
            The last month in the delivery window for cash bids or indexes using the following format: "YYYYMM"(i.e. 202607). For example, a bid with a delivery window of 202612 through 202703 can only be retrieved by input of 202703.<br /><br />For instrumentType = 'IndexBasis' or 'IndexCash', this parameter accepts rolling month codes: 'A' - 'L', which represent the forward delivery month from front month (A) to the 11th (L) forward month
          required: false
          schema: 
            type: string
            example: '202607'
        - 
          in: query
          name: indexGroup
          description: |
            A valid index aggregate level that returns all index instruments belonging to a specific indexGroup.Combining indexGroup and country or region are the only way to query national indexes and regional indexes.<br /><br />This parameter may required if stateFipsCode has not been set.<br/>Available values (multiple values separated by a comma may be used): *nation, region, state, district, county*.
          required: false
          schema: 
            type: string
            example: 'nation'
        - 
          in: query
          name: country
          description: The short country name to further refine the index instruments.
          required: false
          schema: 
            type: string
            example: 'US'
        - 
          in: query
          name: region
          description: A short region name to further refine the index instruments.
          required: false
          schema: 
            type: string
            enum: 
              - 'Delta'

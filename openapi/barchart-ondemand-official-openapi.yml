                      type: object
                      properties: 
                        symbol: 
                          description: The symbol of the sector.
                          type: string
                          nullable: true
                          example: '-MEDR'
                        sector: 
                          description: The name of the sector.
                          type: string
                          nullable: true
                          example: 'Medical - Drugs'
                        weightAlpha: 
                          description: The weighted alpha of the sector.

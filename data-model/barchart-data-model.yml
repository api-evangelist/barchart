description: >-
  Entity graph of the Barchart OnDemand API, derived from the official
  OpenAPI 3.0.3 (71 operations). OnDemand is a read-only market-data surface:
  there are no writable resources, and the join key across nearly every
  entity is the instrument symbol (equities, futures, options, forex, crypto,
  indexes) plus exchange codes. Entities below group the response families by
  the operations that return them.
join_keys:
- name: symbol
  description: >-
    Instrument identifier used by 41 of 71 operations (symbols list param on
    28, singular symbol on 13); connects quotes, history, profiles,
    fundamentals, corporate actions, technicals, and news.
- name: exchange
  description: Exchange code scoping bulk endpoints (getEquitiesByExchange, getFuturesByExchange, getCorporateActionsByExchange).

actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No openly documented public WebSocket protocol surface exists. Barchart's
    documented public API (OnDemand) is request/response REST/SOAP with an
    apikey. Real-time push exists only as sales-gated products (Event-Based API
    over REST/Socket.IO and a separate streaming market-data service) with no
    published raw WebSocket contract, so no AsyncAPI document was created.

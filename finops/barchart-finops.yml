meters:
- name: subscription_package
  description: Packaged subscription fee scoped to licensed endpoints, asset classes, and data timeliness.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - package
- name: exchange_licensing
  description: Exchange fees levied for real-time market data, separate from the Barchart subscription.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - exchange
- name: api_requests
  description: OnDemand API requests against the licensed key; bounded by entitlement rather than metered price.
  unit: requests
  aggregation: sum
  dimensions:
  - apikey
  - endpoint
principles:
- name: Visibility
  description: Track which endpoints and asset classes each key is licensed for and how requests map to teams and use cases.
- name: Allocation
  description: Issue separate keys/packages per application so subscription and exchange costs map to internal cost centers.
- name: Optimization
  description: License only the timeliness you need (end-of-day or delayed instead of real-time), scope symbols/exchanges tightly, and use maxRecords and date ranges to avoid oversized pulls.
- name: Accountability
  description: Review the package scope and exchange fees against actual usage each renewal; drop unused endpoints or asset classes.

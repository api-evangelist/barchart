description: >-
  FinOps view of Barchart OnDemand spend. Barchart is a commercially licensed
  market-data vendor billed through packaged subscriptions or custom enterprise
  agreements rather than transparent usage rates. The dominant cost drivers are
  the breadth of licensed endpoints and asset classes, data timeliness
  (end-of-day vs. delayed vs. real-time), symbol/exchange coverage, and - for
  real-time - separately levied exchange licensing fees. Redistribution rights
  and streaming (Event-Based API / streaming market data) add cost at the
  enterprise tier.
notes: >-
  Barchart does not publish per-unit rates; costs are contract-negotiated.
  Reconcile the licensed package, exchange fees, and any redistribution terms
  directly with Barchart. Right-size by licensing only the endpoints, asset
  classes, and timeliness actually required.
